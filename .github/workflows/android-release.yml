name: Build and Release FreeRDP Android

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'tag name for release (ex: v1.0.0-manual)'
        required: true
        default: 'manual-build'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm ninja-build

      - name: Setup Android SDK and Exact NDK
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "ndk;29.0.13113456" "cmake;3.22.1"
          echo "ANDROID_SDK_PATH=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_PATH=$ANDROID_HOME/ndk/29.0.13113456" >> $GITHUB_ENV

      - name: Build Native Libraries (All Architectures)
        run: |
          sed -i 's/CMAKE_BUILD_TYPE=Debug/CMAKE_BUILD_TYPE=Release/g' scripts/android-build.conf
          bash ./scripts/android-build-freerdp.sh --ndk ${{ env.ANDROID_NDK_PATH }} --sdk ${{ env.ANDROID_SDK_PATH }}

      - name: Build APK (Release)
        working-directory: client/Android/Studio
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          # keytool -genkey -v -keystore release.keystore -alias "$KEY_ALIAS" -keyalg RSA -keysize 2048 -validity 10000
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
          cat << EOF >> aFreeRDP/build.gradle
          
          android {
              defaultConfig {
                  versionCode $((GITHUB_RUN_NUMBER))
                  versionName "1.0.$((GITHUB_RUN_NUMBER))"
              }
              signingConfigs {
                  releaseConfig {
                      storeFile file("../release.keystore")
                      storePassword "$KEYSTORE_PASSWORD"
                      keyAlias "$KEY_ALIAS"
                      keyPassword "$KEY_PASSWORD"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.releaseConfig
                  }
              }
          }
          EOF
          
          ./gradlew assembleRelease

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}${{ github.event_name == 'workflow_dispatch' && format('-{0}', github.run_number) || '' }}
          files: |
            client/Android/Studio/aFreeRDP/build/outputs/apk/release/*.apk
          generate_release_notes: true
          append_body: false
