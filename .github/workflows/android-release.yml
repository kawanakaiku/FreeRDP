name: Build and Release FreeRDP Android

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm

      - name: Setup Environment Variables for SDK/NDK
        run: |
          echo "ANDROID_SDK_PATH=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_PATH=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

      - name: Build Native Libraries (32-bit Release)
        run: |
          bash ./scripts/android-build-freerdp.sh --ndk ${{ env.ANDROID_NDK_PATH }} --sdk ${{ env.ANDROID_SDK_PATH }} --conf ./scripts/android-build-32.conf

      - name: Build Native Libraries (64-bit Release)
        run: |
          bash ./scripts/android-build-freerdp.sh --ndk ${{ env.ANDROID_NDK_PATH }} --sdk ${{ env.ANDROID_SDK_PATH }} --conf ./scripts/android-build-64.conf

      - name: Build APK (Release)
        working-directory: client/Android/Studio
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            client/Android/Studio/app/build/outputs/apk/release/*-unsigned.apk
          generate_release_notes: true
